<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White/bright satellite icon that will be tinted by Cesium color -->
  
  <!-- Satellite body (central box) -->
  <rect x="9" y="9" width="6" height="6" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Solar panels (left) -->
  <rect x="2" y="8" width="6" height="8" fill="#E0E0E0" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="3" y1="10" x2="7" y2="10" stroke="#888888" stroke-width="0.5"/>
  <line x1="3" y1="12" x2="7" y2="12" stroke="#888888" stroke-width="0.5"/>
  <line x1="3" y1="14" x2="7" y2="14" stroke="#888888" stroke-width="0.5"/>
  
  <!-- Solar panels (right) -->
  <rect x="16" y="8" width="6" height="8" fill="#E0E0E0" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="17" y1="10" x2="21" y2="10" stroke="#888888" stroke-width="0.5"/>
  <line x1="17" y1="12" x2="21" y2="12" stroke="#888888" stroke-width="0.5"/>
  <line x1="17" y1="14" x2="21" y2="14" stroke="#888888" stroke-width="0.5"/>
  
  <!-- Antenna (top) -->
  <line x1="12" y1="9" x2="12" y2="4" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="3" r="1.5" fill="#FFFFFF"/>
  
  <!-- Communication dish (bottom right) -->
  <circle cx="14" cy="14" r="1.2" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Outer glow for better visibility -->
  <rect x="9" y="9" width="6" height="6" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
</svg>
